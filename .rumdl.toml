# Repo-local rumdl config. Replaces (does not merge with) the global config,
# so the MD013 barometer (120 cols, check-only, never --fix) is repeated here.
# docs/history/*.md are immutable session logs; excluded entirely.
[global]
exclude = ["docs/history/*.md"]

[MD013]
line-length = 120
code-blocks = false
tables = false
reflow = false
